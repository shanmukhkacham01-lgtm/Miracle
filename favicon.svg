<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100%" height="100%" rx="20" fill="#111111"/>
  <g transform="translate(5, 5)">
    <!-- Sparkle (Soft Gold: #C8A97E) -->
    <path d="M 45,15 Q 45,28 32,28 Q 45,28 45,41 Q 45,28 58,28 Q 45,28 45,15 Z" fill="#C8A97E" />
    
    <!-- Sleek Geometric M lines (White for high contrast on black background) -->
    <line x1="20" y1="80" x2="20" y2="35" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <line x1="20" y1="35" x2="45" y2="60" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <line x1="45" y1="60" x2="70" y2="35" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    <line x1="70" y1="35" x2="70" y2="80" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
    
    <!-- Gold dot on center tip -->
    <circle cx="45" cy="60" r="4.5" fill="#C8A97E" />
  </g>
</svg>

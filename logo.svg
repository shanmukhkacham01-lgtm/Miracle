<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="100%">
  <!-- Background (Warm Off-white) -->
  <rect width="100%" height="100%" fill="#FAFAF8"/>
  
  <g transform="translate(50, 45)">
    <!-- Symbol: Geometric M -->
    <g transform="translate(0, 10)">
      <!-- Sparkle (Soft Gold: #C8A97E) -->
      <path d="M 45,10 Q 45,25 30,25 Q 45,25 45,40 Q 45,25 60,25 Q 45,25 45,10 Z" fill="#C8A97E" />
      
      <!-- Sleek Geometric M lines -->
      <!-- Left leg -->
      <line x1="20" y1="90" x2="20" y2="40" stroke="#111111" stroke-width="4.5" stroke-linecap="round" />
      <!-- Diagonal left-to-middle -->
      <line x1="20" y1="40" x2="45" y2="70" stroke="#111111" stroke-width="4.5" stroke-linecap="round" />
      <!-- Diagonal middle-to-right -->
      <line x1="45" y1="70" x2="70" y2="40" stroke="#111111" stroke-width="4.5" stroke-linecap="round" />
      <!-- Right leg -->
      <line x1="70" y1="40" x2="70" y2="90" stroke="#111111" stroke-width="4.5" stroke-linecap="round" />
      
      <!-- Connective gold dot on the middle tip -->
      <circle cx="45" cy="70" r="3.5" fill="#C8A97E" />
    </g>

    <!-- Wordmark: MIRACLE -->
    <text x="110" y="70" font-family="'Playfair Display', 'Didot', 'Georgia', serif" font-size="44" font-weight="600" letter-spacing="12" fill="#111111">MIRACLE</text>
    
    <!-- Tagline: Discover the Extraordinary -->
    <text x="112" y="98" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" font-weight="400" letter-spacing="4.5" fill="#666666" opacity="0.8">DISCOVER THE EXTRAORDINARY</text>
  </g>
</svg>
